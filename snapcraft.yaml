name: pdfarranger
base: core24
adopt-info: pdfarranger
grade: stable
confinement: strict
compression: lzo
contact: https://github.com/pdfarranger/pdfarranger-snap/issues
website: https://github.com/pdfarranger/pdfarranger
issues: https://github.com/pdfarranger/pdfarranger/issues
source-code: https://github.com/pdfarranger/pdfarranger
license: GPL-3.0-only

platforms:
  amd64:
  arm64:

slots:
  pdfarranger:
    interface: dbus
    bus: session
    name: com.github.jeromerobert.pdfarranger

plugs:
  shared-memory:
    private: true

apps:
  pdfarranger:
    command: usr/bin/pdfarranger
    desktop: usr/share/applications/com.github.jeromerobert.pdfarranger.desktop
    extensions:
      - gnome
    plugs:
      - home
      - removable-media
    common-id: com.github.jeromerobert.pdfarranger
    environment:
      PYTHONPATH: $SNAP/usr/lib/python3.12/dist-packages:$PYTHONPATH
parts:
  pdfarranger:
    plugin: python
    source: https://github.com/pdfarranger/pdfarranger.git
    parse-info:
      - usr/share/metainfo/com.github.jeromerobert.pdfarranger.metainfo.xml
    source-tag: '1.13.0'
    source-depth: 1
    override-prime: |
       craftctl default
       sed -i.bak -e 's|Icon=com.github.jeromerobert.pdfarranger|Icon=/usr/share/icons/hicolor/scalable/apps/com.github.jeromerobert.pdfarranger.svg|g' $CRAFT_PART_INSTALL/usr/share/applications/com.github.jeromerobert.pdfarranger.desktop
    python-packages:
      - distutils-extra-python
      - lxml
      - packaging
      - pillow
      - pybind11
      - setuptools-scm
      - tomli
      - typing_extensions
      - deprecation
      - pikepdf
      - python_dateutil
      - img2pdf
    build-environment:
      - PATH: ${CRAFT_PART_INSTALL}/bin:${PATH}
      - PYTHONPATH: ''
    build-packages:
      - intltool
    prime:
      - -usr/bin/activate
      - -usr/bin/activate.csh
      - -usr/bin/activate.fish
      - -usr/bin/Activate.ps1
      - -usr/bin/python
      - -usr/bin/python3
      - -usr/bin/python3.12
      - -usr/bin/pip
      - -usr/bin/pip3
      - -usr/bin/pip3.12
      - -pyvenv.cfg
      - -include
      - -etc
      - -lib
      - -usr/lib/python3.12/site-packages/distutils_extra_python-2.39.2.dist-info
      - -usr/lib/python3.12/site-packages/_distutils_hack
      - -usr/lib/python3.12/site-packages/pikepdf.libs
      - -usr/lib/python3.12/site-packages/Pillow.libs
      - -usr/lib/python3.12/site-packages/pip*
      - -usr/lib/python3.12/site-packages/pkg_re*
      - -usr/lib/python3.12/site-packages/setuptools
      - -usr/lib/python3.12/site-packages/setuptools-59*
      - -usr/lib/python3.12/site-packages/six*
      - -lib64
    organize:
      bin: usr/bin
      share: usr/share
      lib/python3.12/site-packages: usr/lib/python3.12/dist-packages

  deps:
    after: [ pdfarranger ]
    plugin: nil
    stage-packages:
      - gir1.2-poppler-0.18
      - libpoppler134
      - libpoppler-glib8t64
      - libqpdf29t64
    override-prime: |
      craftctl default
      echo $SNAPCRAFT_PROJECT_VERSION
    prime:
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/girepository-1.0/Poppler-0.18.typelib
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libpoppler.so.134
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libpoppler.so.134.0.0
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libpoppler-glib.so.8
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libpoppler-glib.so.8.26.0
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libqpdf.so.29
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libqpdf.so.29.9.0
